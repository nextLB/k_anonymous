<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}K-匿名轨迹系统{% endblock %}</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/static/css/app.css" />
    {% block head %}{% endblock %}
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar-inner">
        <div class="brand"><a href="/">校园步行轨迹 K-匿名</a></div>
        <nav class="nav">
          <a href="/dashboard/">仪表盘</a>
          <a href="/trajectories/upload/">上传轨迹</a>
          {% if user.is_authenticated %}
            <span class="muted">用户：{{ user.username }}</span>
            <a href="/accounts/profile/">账户</a>
            <a href="/accounts/logout/">退出</a>
          {% else %}
            <a href="/accounts/login/">登录</a>
            <a href="/accounts/signup/">注册</a>
          {% endif %}
        </nav>
      </div>
    </header>

    <main class="container">
      {% if messages %}
        <div class="messages">
          {% for message in messages %}
            <div class="message {{ message.tags }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>

{% extends "base/base.html" %}
{% block title %}设置新密码 - K-匿名轨迹系统{% endblock %}

{% block content %}
  <div class="card">
    <h2>设置新密码</h2>
    {% if validlink %}
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn" type="submit">保存新密码</button>
      </form>
    {% else %}
      <p class="muted">该链接无效或已过期，请重新发起找回密码。</p>
      <a class="btn" href="/accounts/password-reset/">重新找回</a>
    {% endif %}
  </div>
{% endblock %}

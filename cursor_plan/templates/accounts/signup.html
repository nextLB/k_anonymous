{% extends "base/base.html" %}
{% block title %}注册 - K-匿名轨迹系统{% endblock %}

{% block content %}
  <div class="card">
    <h2>注册</h2>
    <p class="muted">注册后会发送邮箱验证链接（开发环境邮件会打印在服务器控制台）。</p>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn" type="submit">创建账户</button>
    </form>
    <p class="muted" style="margin-top: 12px;">
      已有账号？<a href="/accounts/login/">去登录</a>
    </p>
  </div>
{% endblock %}

{% extends "base/base.html" %}
{% block title %}找回密码 - K-匿名轨迹系统{% endblock %}

{% block content %}
  <div class="card">
    <h2>找回密码</h2>
    <p class="muted">输入你注册时的邮箱，我们会发送重置链接（开发环境会打印在控制台）。</p>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn" type="submit">发送重置邮件</button>
    </form>
  </div>
{% endblock %}
